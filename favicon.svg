<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3a800"/>
      <stop offset="100%" style="stop-color:#b07d00"/>
    </linearGradient>
    <linearGradient id="tab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc00"/>
      <stop offset="100%" style="stop-color:#e3a800"/>
    </linearGradient>
    <linearGradient id="front" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd633"/>
      <stop offset="100%" style="stop-color:#e3a800"/>
    </linearGradient>
  </defs>
  <!-- Back folder body -->
  <rect x="4" y="22" width="56" height="36" rx="5" ry="5" fill="url(#body)" opacity="0.9"/>
  <!-- Folder tab -->
  <path d="M4 22 Q4 18 8 18 L26 18 Q30 18 32 22 Z" fill="url(#tab)"/>
  <!-- Front panel with slight offset for depth -->
  <rect x="4" y="28" width="56" height="30" rx="4" ry="4" fill="url(#front)"/>
  <!-- Inner shine line -->
  <rect x="10" y="33" width="44" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>
  <!-- cpp text indicator -->
  <text x="32" y="51" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="rgba(80,50,0,0.7)" letter-spacing="1">.cpp</text>
</svg>
